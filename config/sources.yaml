#创建 config/sources.yaml 放 3 个 RSS 源
sources:
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    type: "rss"

  - name: "Hacker News"
    url: "https://news.ycombinator.com/rss"
    type: "rss"

  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    type: "rss"

email:
  enabled: true
  sender: "${EMAIL_SENDER}"
  auth_code: "${EMAIL_AUTH_CODE}"
  smtp_server: "smtp.163.com"
  smtp_port: 465
  to: "${EMAIL_TO}"


config:
  max_articles_per_source: 5
  timeout_seconds: 10
  user_agent: "NewsDigestAgent/1.0"