name: Daily News Agent

on:
  schedule:
    # ✅ 正确格式：分钟 小时 * * *（UTC 时间）
    - cron: '50 2 * * *'
  workflow_dispatch:

jobs:
  run-news-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .  # 从项目根目录安装
          pip list  # 调试：查看已安装的包

      - name: Run News Agent
        env:
          # ✅ 修复环境变量（添加引号）
          PYTHONPATH: "${{ github.workspace }}/src:${{ github.workspace }}"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          # ✅ 直接运行任务（无需内部定时）
          python main/auto_run.py